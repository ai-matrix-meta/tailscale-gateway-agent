version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    groups:
      go-dependencies:
        patterns:
          - "*"
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "02:30"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
